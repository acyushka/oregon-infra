syntax = "proto3";

package resource.v1;

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/acyushka/oregon-infra/contracts/proto/resource;resourcev1";

enum ResourceType {
  RESOURCE_TYPE_UNSPECIFIED = 0;
  RESOURCE_TYPE_MEETING_ROOM = 1; // переговорка
  RESOURCE_TYPE_WORKSPACE = 2; // рабочее место
  RESOURCE_TYPE_DEVICE = 3; // устройство
}

enum ResourceStatus {
  RESOURCE_STATUS_UNSPECIFIED = 0;
  RESOURCE_STATUS_AVAILABLE = 1; // доступен
  RESOURCE_STATUS_OCCUPIED = 2; // занят прямо сейчас
  RESOURCE_STATUS_MAINTENANCE = 3; // плановое обслуживание
  RESOURCE_STATUS_EMERGENCY = 4; // форс-мажор
}

message Resource {
  string resource_id = 1;
  string name = 2;
  ResourceType type = 3;
  string location = 4;
  ResourceStatus status = 5;
  oneof details {
    MeetingRoomDetails meeting_room = 6;
    WorkspaceDetails workspace = 7;
    DeviceDetails device = 8;
  }
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message MeetingRoomDetails {
  int32 capacity = 1;
  bool has_projector = 2;
  bool has_whiteboard = 3;
}

message WorkspaceDetails {
  bool has_monitor = 1;
}

message DeviceDetails {
  string device_type = 1;
  string serial_number = 2;
  string model = 3;
  string description = 4;
}

// ───────────────────────────────────────────
//  for Frontend
// ───────────────────────────────────────────

service ResourcePublicService {
  rpc CreateResource(CreateResourceRequest) returns (CreateResourceResponse);
  rpc GetResource(GetResourceRequest) returns (GetResourceResponse);
  rpc GetResourcesList(GetResourcesListRequest) returns (GetResourcesListResponse);
  rpc UpdateResource(UpdateResourceRequest) returns (UpdateResourceResponse);
  rpc DeleteResource(DeleteResourceRequest) returns (DeleteResourceResponse);
  rpc ChangeResourceStatus(ChangeResourceStatusRequest) returns (ChangeResourceStatusResponse);
  rpc GetAvailableResources(GetAvailableResourcesRequest) returns (GetAvailableResourcesResponse);
}

message CreateResourceRequest {
  string name = 1;
  ResourceType type = 2;
  string location = 3;
  oneof details {
    MeetingRoomDetails meeting_room = 4;
    WorkspaceDetails workspace = 5;
    DeviceDetails device = 6;
  }
}

message CreateResourceResponse {
  Resource resource = 1;
}

message GetResourceRequest {
  string resource_id = 1;
}

message GetResourceResponse {
  Resource resource = 1;
}

message GetResourcesListRequest {
  repeated ResourceType types = 1;
}

message GetResourcesListResponse {
  repeated Resource resources = 1;
}

message UpdateResourceRequest {
  string resource_id = 1;
  Resource resource = 2;
  google.protobuf.FieldMask field_mask = 3;
}

message UpdateResourceResponse {
  Resource resource = 1;
}

message DeleteResourceRequest {
  string resource_id = 1;
}

message DeleteResourceResponse {
  bool success = 1;
}

message ChangeResourceStatusRequest {
  string resource_id = 1;
  ResourceStatus status = 2;
  string reason = 3;
}

message ChangeResourceStatusResponse {
  Resource resource = 1;
}

// ───────────────────────────────────────────
//  for Booking
// ───────────────────────────────────────────

service ResourceBookingService {
  rpc GetResource(GetResourceRequest) returns (GetResourceResponse);
  rpc CheckResourceStatus(CheckResourceStatusRequest) returns (CheckResourceStatusResponse);
  rpc GetAvailableResources(GetAvailableResourcesRequest) returns (GetAvailableResourcesResponse);
  rpc UpdateResourceOccupancy(UpdateResourceOccupancyRequest) returns (UpdateResourceOccupancyResponse);
}

message CheckResourceStatusRequest {
  string resource_id = 1;
}

message CheckResourceStatusResponse {
  bool is_available = 1;
  ResourceStatus status = 2;
}

message GetAvailableResourcesRequest {
  repeated ResourceType types = 1;
  string location = 2;
}

message GetAvailableResourcesResponse {
  repeated Resource resources = 1;
  int32 total_count = 2;
}

message UpdateResourceOccupancyRequest {
  string resource_id = 1;
  bool is_occupied = 2;
}

message UpdateResourceOccupancyResponse {
  bool success = 1;
  ResourceStatus status = 2;
}
